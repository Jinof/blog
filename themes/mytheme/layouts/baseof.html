<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Site.Title }}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 1rem;
            color: #333;
        }
        header {
            margin-bottom: 3rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #eee;
        }
        header h1 a {
            text-decoration: none;
            color: #333;
            font-size: 1.8rem;
        }
        .post-list {
            list-style: none;
        }
        .post-item {
            margin-bottom: 1.5rem;
        }
        .post-item a {
            text-decoration: none;
            color: #0066cc;
            font-size: 1.2rem;
        }
        .post-item a:hover {
            text-decoration: underline;
        }
        .post-meta {
            color: #666;
            font-size: 0.9rem;
            margin-top: 0.3rem;
        }
        .post-content {
            margin-top: 2rem;
        }
        .post-content h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
        }
        .post-content h2, .post-content h3 {
            margin-top: 1.5rem;
            margin-bottom: 0.75rem;
        }
        .post-content p {
            margin-bottom: 1rem;
        }
        .post-content code {
            background: #f4f4f4;
            padding: 0.2rem 0.4rem;
            border-radius: 3px;
            font-size: 0.9em;
        }
        .post-content pre {
            background: #f4f4f4;
            padding: 1rem;
            overflow-x: auto;
            border-radius: 5px;
            margin-bottom: 1rem;
        }
        .post-content pre code {
            background: none;
            padding: 0;
        }
        .post-content img {
            max-width: 100%;
            height: auto;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 1.5rem;
            text-decoration: none;
            color: #666;
        }
        .back-link:hover {
            color: #0066cc;
        }
        footer {
            margin-top: 3rem;
            padding-top: 1rem;
            border-top: 1px solid #eee;
            color: #666;
            font-size: 0.9rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <header>
        <h1><a href="/">{{ .Site.Title }}</a></h1>
    </header>

    <main>
        {{ block "main" . }}{{ end }}
    </main>

    <footer>
        &copy; {{ now.Year }} {{ .Site.Title }}. All rights reserved.
    </footer>
</body>
</html>
